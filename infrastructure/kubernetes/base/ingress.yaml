apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: college-erp-ingress
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - erp.example.com
      secretName: erp-example-tls
  rules:
    - host: erp.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: college-erp-backend
                port:
                  number: 5001
          - path: /
            pathType: Prefix
            backend:
              service:
                name: college-erp-frontend
                port:
                  number: 3000
