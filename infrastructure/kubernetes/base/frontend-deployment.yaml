apiVersion: apps/v1
kind: Deployment
metadata:
  name: college-erp-frontend
  labels:
    app: college-erp-frontend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: college-erp-frontend
  template:
    metadata:
      labels:
        app: college-erp-frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/your-org/college-erp-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
          envFrom:
            - secretRef:
                name: college-erp-frontend-secrets
            - configMapRef:
                name: college-erp-frontend-config
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "768Mi"
